name: Art-Platform Production Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Build & Push Images
        run: |
          doctl registry login
          docker build -t registry.digitalocean.com/art-registry/auth:latest ./services/auth
          docker push registry.digitalocean.com/art-registry/auth:latest

      - name: Deploy to DigitalOcean Kubernetes
        run: |
          doctl kubernetes cluster kubeconfig save art-platform-cluster
          kubectl apply -f k8s/